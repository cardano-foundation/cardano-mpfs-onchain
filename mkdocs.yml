site_name: Cardano MPFS Onchain
site_url: https://cardano-foundation.github.io/cardano-mpfs-onchain/
repo_url: https://github.com/cardano-foundation/cardano-mpfs-onchain

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.path
    - toc.integrate
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - footnotes
  - def_list
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Development: development.md
  - Haskell Cage Library: haskell-cage.md
  - Architecture:
      - Overview: architecture/overview.md
      - Validators: architecture/validators.md
      - Types & Encodings: architecture/types.md
      - Proof System: architecture/proofs.md
      - Blaster UPLC Properties: architecture/blaster.md
      - Security Properties: architecture/properties.md
