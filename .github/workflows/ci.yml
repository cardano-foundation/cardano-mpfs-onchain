name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: paolino/dev-assets/setup-nix@v0.0.1
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build all checks
        run: >-
          nix build --quiet
          .#checks.x86_64-linux.library
          .#checks.x86_64-linux.cage-tests
          .#checks.x86_64-linux.cage-test-vectors
          .#checks.x86_64-linux.lint
          .#checks.x86_64-linux.vectors-freshness
          .#checks.x86_64-linux.aiken-check
          .#checks.x86_64-linux.aiken-build

      - name: Stage plutus.json artifact
        run: nix build --quiet .#checks.x86_64-linux.aiken-build

      - name: Upload plutus.json
        uses: actions/upload-artifact@v6
        with:
          name: plutus-json
          path: result

  tests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: paolino/dev-assets/setup-nix@v0.0.1
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Run cage QuickCheck tests
        run: nix run .#cage-tests

  e2e:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: paolino/dev-assets/setup-nix@v0.0.1
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build plutus.json blueprint
        run: nix build --quiet .#checks.x86_64-linux.aiken-build

      - name: Run cage devnet E2E tests
        env:
          # Pass the freshly-built blueprint to the E2E suite. The
          # test starts a cardano-node devnet, applies the seed
          # parameter to the blueprint at runtime, and submits
          # transactions against the devnet — verifying that the
          # Haskell encoding matches what the Aiken validator
          # decodes (Constitution Principle I).
          MPFS_BLUEPRINT: ${{ github.workspace }}/result
          # The devnet bootstrap genesis files are checked into
          # haskell/e2e-test/genesis/ (mirrored from the upstream
          # cardano-node-clients package). Override the default
          # relative path so the test finds them regardless of CWD.
          E2E_GENESIS_DIR: ${{ github.workspace }}/haskell/e2e-test/genesis
        run: nix run .#cage-tests-e2e

  lint:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: paolino/dev-assets/setup-nix@v0.0.1
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Run fourmolu + hlint
        run: nix run .#lint

  lean:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lean
    steps:
      - uses: actions/checkout@v6

      - uses: paolino/dev-assets/setup-nix@v0.0.1
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build Lean proofs
        run: nix shell nixpkgs#lean4 -c lake build
