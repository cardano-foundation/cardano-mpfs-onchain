name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: paolino/dev-assets/setup-nix@v0.0.1
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Check cage test vectors freshness
        run: nix develop --command just vectors-check

      - name: Build plutus.json
        run: nix build

      - name: Run aiken tests
        run: nix develop --command aiken check

      - name: Upload plutus.json
        uses: actions/upload-artifact@v6
        with:
          name: plutus-json
          path: result

  lean:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lean
    steps:
      - uses: actions/checkout@v6

      - uses: paolino/dev-assets/setup-nix@v0.0.1
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build Lean proofs
        run: nix shell nixpkgs#lean4 -c lake build

  # TypeScript E2E removed — replaced by Haskell E2E
  # in cardano-mpfs-offchain (CageFlow tests).
  # See https://github.com/cardano-foundation/cardano-mpfs-onchain/issues/42
