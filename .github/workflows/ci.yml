name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: paolino/dev-assets/setup-nix@v0.0.1
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Check cage test vectors freshness
        run: nix develop --command just vectors-check

      - name: Build plutus.json
        run: nix build

      - name: Run aiken tests
        run: nix develop --command aiken check

      - name: Upload plutus.json
        uses: actions/upload-artifact@v6
        with:
          name: plutus-json
          path: result

  lean:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lean
    steps:
      - uses: actions/checkout@v6

      - uses: paolino/dev-assets/setup-nix@v0.0.1
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build Lean proofs
        run: nix shell nixpkgs#lean4 -c lake build

  e2e:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: paolino/dev-assets/setup-nix@v0.0.1
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Download plutus.json
        uses: actions/download-artifact@v6
        with:
          name: plutus-json

      - name: Prepare plutus.json
        run: |
          if [ -f result ]; then mv result plutus.json; fi
          ls -la plutus.json

      - name: Build and run E2E tests
        run: |
          nix build .#e2e-tests
          nix develop --command bash -c \
            'MPFS_BLUEPRINT=plutus.json ./result/bin/e2e-tests'
